name: Build and Release

on:
  release:
    types: [created]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer

      - name: Extract version
        id: version
        run: |
          VERSION=$(grep 'MARKETING_VERSION' ClaudePerch.xcodeproj/project.pbxproj | head -1 | tr -d ' ;' | cut -d= -f2)
          BUILD=$(grep 'CURRENT_PROJECT_VERSION' ClaudePerch.xcodeproj/project.pbxproj | head -1 | tr -d ' ;' | cut -d= -f2)
          TAG="v${VERSION}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "build=$BUILD" >> $GITHUB_OUTPUT
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Version: $VERSION (build $BUILD) tag: $TAG"

      - name: Import code signing certificate
        env:
          CERTIFICATE_P12: ${{ secrets.CERTIFICATE_P12 }}
          CERTIFICATE_PASSWORD: ${{ secrets.CERTIFICATE_PASSWORD }}
        run: |
          # Create temporary keychain
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -hex 16)

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Import certificate
          CERT_PATH=$RUNNER_TEMP/certificate.p12
          echo -n "$CERTIFICATE_P12" | base64 --decode -o "$CERT_PATH"
          security import "$CERT_PATH" -P "$CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          rm "$CERT_PATH"

          # Allow codesign to access keychain
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Add to search list
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db

          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> $GITHUB_ENV

      - name: Build release archive
        env:
          TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          xcodebuild archive \
            -scheme ClaudePerch \
            -configuration Release \
            -archivePath build/ClaudePerch.xcarchive \
            -destination "generic/platform=macOS" \
            ENABLE_HARDENED_RUNTIME=YES \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Developer ID Application" \
            DEVELOPMENT_TEAM="$TEAM_ID" \
            OTHER_CODE_SIGN_FLAGS="--keychain $KEYCHAIN_PATH"

      - name: Export app
        run: |
          cp -R "build/ClaudePerch.xcarchive/Products/Applications/Claude Perch.app" "build/"

      - name: Notarize app
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          # Create zip for notarization
          ditto -c -k --keepParent "build/Claude Perch.app" "build/ClaudePerch-notarize.zip"

          # Submit for notarization
          xcrun notarytool submit "build/ClaudePerch-notarize.zip" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --team-id "$TEAM_ID" \
            --wait

          # Staple the notarization ticket
          xcrun stapler staple "build/Claude Perch.app"

          rm "build/ClaudePerch-notarize.zip"

      - name: Create DMG
        run: |
          brew install create-dmg || true
          VERSION=${{ steps.version.outputs.version }}

          create-dmg \
            --volname "Claude Perch" \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "Claude Perch.app" 150 200 \
            --app-drop-link 450 200 \
            --hide-extension "Claude Perch.app" \
            --no-internet-enable \
            "build/ClaudePerch-${VERSION}.dmg" \
            "build/Claude Perch.app" || \
          hdiutil create -volname "Claude Perch" \
            -srcfolder "build/Claude Perch.app" \
            -ov -format UDZO \
            "build/ClaudePerch-${VERSION}.dmg"

      - name: Notarize DMG
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          VERSION=${{ steps.version.outputs.version }}
          xcrun notarytool submit "build/ClaudePerch-${VERSION}.dmg" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --team-id "$TEAM_ID" \
            --wait

          xcrun stapler staple "build/ClaudePerch-${VERSION}.dmg"

      - name: Generate Sparkle appcast
        run: |
          VERSION=${{ steps.version.outputs.version }}
          BUILD=${{ steps.version.outputs.build }}
          TAG=${{ steps.version.outputs.tag }}
          DMG="build/ClaudePerch-${VERSION}.dmg"
          DMG_SIZE=$(stat -f%z "$DMG")
          DOWNLOAD_URL="https://github.com/${{ github.repository }}/releases/download/${TAG}/ClaudePerch-${VERSION}.dmg"
          PUB_DATE=$(date -u '+%a, %d %b %Y %H:%M:%S +0000')

          mkdir -p build/appcast
          cat > build/appcast/appcast.xml << EOF
          <?xml version="1.0" encoding="utf-8"?>
          <rss version="2.0" xmlns:sparkle="http://www.andymatuschak.org/xml-namespaces/sparkle" xmlns:dc="http://purl.org/dc/elements/1.1/">
            <channel>
              <title>Claude Perch Updates</title>
              <link>https://github.com/${{ github.repository }}</link>
              <description>Most recent changes with links to updates.</description>
              <language>en</language>
              <item>
                <title>Version ${VERSION}</title>
                <pubDate>${PUB_DATE}</pubDate>
                <sparkle:version>${BUILD}</sparkle:version>
                <sparkle:shortVersionString>${VERSION}</sparkle:shortVersionString>
                <sparkle:minimumSystemVersion>15.0</sparkle:minimumSystemVersion>
                <enclosure
                  url="${DOWNLOAD_URL}"
                  length="${DMG_SIZE}"
                  type="application/octet-stream"
                />
              </item>
            </channel>
          </rss>
          EOF

      - name: Upload DMG to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=${{ steps.version.outputs.version }}
          TAG=${{ steps.version.outputs.tag }}
          gh release view "$TAG" --repo ${{ github.repository }} 2>/dev/null || \
            gh release create "$TAG" --repo ${{ github.repository }} --title "Claude Perch $TAG" --notes "Auto-built release"
          gh release upload "$TAG" "build/ClaudePerch-${VERSION}.dmg" --repo ${{ github.repository }} --clobber

      - name: Deploy appcast to GitHub Pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if git ls-remote --heads origin gh-pages | grep -q gh-pages; then
            git fetch origin gh-pages
            git checkout gh-pages
          else
            git checkout --orphan gh-pages
            git rm -rf . 2>/dev/null || true
          fi

          cp build/appcast/appcast.xml appcast.xml
          git add appcast.xml
          git commit -m "Update appcast for ${{ steps.version.outputs.tag }}" || true
          git push origin gh-pages
          git checkout -

      - name: Cleanup keychain
        if: always()
        run: |
          if [ -f "$KEYCHAIN_PATH" ]; then
            security delete-keychain "$KEYCHAIN_PATH"
          fi
